# ============================================
# Reverse Proxy para InvestAI
# ============================================
# Este arquivo configura APENAS o InvestAI.
# NÃO altera nada do Nginx principal nem de
# outros sistemas já rodando na VPS.
#
# COMO USAR:
# 1. Copie este arquivo para /etc/nginx/sites-available/
#    sudo cp investai-proxy.conf /etc/nginx/sites-available/investai
#
# 2. Crie o link simbólico:
#    sudo ln -s /etc/nginx/sites-available/investai /etc/nginx/sites-enabled/investai
#
# 3. Teste a configuração (NÃO reinicia, só valida):
#    sudo nginx -t
#
# 4. Se o teste passar, recarregue (reload, NÃO restart):
#    sudo systemctl reload nginx
#
#    ⚠️ "reload" aplica a nova config SEM derrubar conexões existentes.
#    Seu outro sistema continua funcionando normalmente.
#
# 5. (Opcional) SSL com Let's Encrypt:
#    sudo certbot --nginx -d investai.seudominio.com
#    O certbot vai alterar APENAS este arquivo.
#
# PRÉ-REQUISITO:
# - Apontar DNS: investai.seudominio.com → IP da VPS (registro A)
# - InvestAI rodando em Docker na porta 3080
# ============================================

server {
    listen 80;
    server_name investai.seudominio.com;  # ← TROQUE pelo seu subdomínio

    # Logs separados para não misturar com outros sistemas
    access_log /var/log/nginx/investai-access.log;
    error_log  /var/log/nginx/investai-error.log;

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;

        # Headers padrão de reverse proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (caso precise no futuro)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
