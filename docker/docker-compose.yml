services:
  simplynvest:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
    container_name: simplynvest-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3080}:80"
    networks:
      - simplynvest-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  simplynvest-net:
    driver: bridge
    name: simplynvest-net
